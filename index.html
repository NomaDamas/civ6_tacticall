<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ojirapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Bebas Neue"', 'ui-sans-serif', 'system-ui'],
              body: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui'],
            },
            colors: {
              panel: '#111827',
              panelSoft: '#1f2937',
              accent: '#22c55e',
              danger: '#ef4444',
              warning: '#f59e0b',
            },
            boxShadow: {
              glow: '0 0 0 1px rgba(34,197,94,.35), 0 14px 36px rgba(34,197,94,.2)',
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        width: 100%;
        overflow-x: hidden;
      }
      body {
        min-height: 100svh;
        background:
          radial-gradient(1100px 560px at 0% -20%, rgba(34, 197, 94, 0.22), transparent 60%),
          radial-gradient(980px 560px at 100% -15%, rgba(16, 185, 129, 0.14), transparent 60%),
          linear-gradient(180deg, #020617 0%, #0b1220 60%, #020617 100%);
      }
      .scanlines::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.022),
          rgba(255, 255, 255, 0.022) 1px,
          transparent 1px,
          transparent 3px
        );
        mix-blend-mode: soft-light;
      }
      @keyframes pulse-ring {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        100% {
          box-shadow: 0 0 0 16px rgba(34, 197, 94, 0);
        }
      }
      .live-ring {
        animation: pulse-ring 1.8s infinite;
      }
      .arcade-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        aspect-ratio: 1 / 1;
        width: 5.2rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        box-shadow: inset 0 -8px 14px rgba(2, 6, 23, 0.35);
      }
      .arcade-btn:active {
        transform: scale(0.96);
      }
      @media (min-width: 640px) {
        .arcade-btn {
          width: 5.8rem;
        }
      }
      #agentStateView,
      #logs {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .md-content p {
        margin: 0.2rem 0 0.45rem;
      }
      .md-content p:last-child {
        margin-bottom: 0;
      }
      .md-content h1,
      .md-content h2,
      .md-content h3 {
        margin: 0.2rem 0 0.4rem;
        font-weight: 700;
      }
      .md-content h1 {
        font-size: 0.95rem;
      }
      .md-content h2 {
        font-size: 0.9rem;
      }
      .md-content h3 {
        font-size: 0.85rem;
      }
      .md-content ul,
      .md-content ol {
        margin: 0.2rem 0 0.45rem 1rem;
        padding-left: 0.5rem;
      }
      .md-content ul {
        list-style: disc;
      }
      .md-content ol {
        list-style: decimal;
      }
      .md-content blockquote {
        margin: 0.3rem 0;
        border-left: 2px solid rgba(148, 163, 184, 0.6);
        padding-left: 0.55rem;
        color: rgb(203 213 225);
      }
      .md-content code {
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.85);
        border-radius: 0.35rem;
        padding: 0.05rem 0.32rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 0.92em;
      }
      .md-content pre {
        margin: 0.35rem 0 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 0.5rem;
        background: rgba(2, 6, 23, 0.9);
        padding: 0.5rem 0.55rem;
        overflow-x: auto;
      }
      .md-content pre code {
        border: none;
        background: transparent;
        padding: 0;
      }
      .md-content a {
        color: rgb(125 211 252);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      @media (max-width: 768px) {
        input,
        textarea,
        select {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  <body class="font-body text-slate-100 antialiased">
    <main class="relative mx-auto min-h-svh w-full max-w-3xl overflow-x-hidden p-3 pb-6 sm:p-5 scanlines">
      <section class="rounded-3xl border border-emerald-400/30 bg-panel/85 p-4 shadow-glow backdrop-blur sm:p-5">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h1 class="font-display text-4xl leading-none tracking-wide text-emerald-300 sm:text-5xl">ojirapper</h1>
            <p class="mt-1 text-xs text-slate-400 sm:text-sm">Voice + Text Command Pad</p>
          </div>
          <div class="flex flex-col items-end gap-2">
            <span id="connectionBadge" class="rounded-full border border-slate-500/60 px-2 py-1 text-xs font-semibold text-slate-300">
              Disconnected
            </span>
            <div class="inline-flex items-center gap-1 rounded-full border border-slate-600/80 bg-slate-900/70 px-2 py-1 text-[11px]">
              <span id="statusDot" class="h-2 w-2 rounded-full bg-amber-400"></span>
              <span id="agentStatus" class="font-semibold text-slate-200">Idle</span>
            </div>
          </div>
        </div>

        <section class="mt-4 rounded-2xl border border-slate-700/70 bg-slate-950/45 p-3 sm:p-4">
          <div class="mb-2 flex items-center justify-between">
            <p class="text-xs uppercase tracking-widest text-slate-400">Live View</p>
            <p id="liveMeta" class="text-xs text-slate-500">No frame yet</p>
          </div>
          <div class="overflow-hidden rounded-xl border border-slate-700 bg-slate-950">
            <img id="liveView" alt="Agent live stream" class="h-auto min-h-40 w-full object-cover sm:min-h-48" />
          </div>
        </section>

        <section class="mt-4 rounded-2xl border border-slate-700/70 bg-slate-950/45 p-3 sm:p-4">
          <label for="commandInput" class="mb-2 block text-xs uppercase tracking-widest text-slate-400">Command</label>
          <textarea
            id="commandInput"
            rows="1"
            placeholder="말하거나 텍스트로 지시를 입력하세요."
            class="w-full resize-none overflow-hidden rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-3 text-base text-slate-100 placeholder:text-slate-500 focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
          ></textarea>
          <div class="mt-3 grid gap-3">
            <div class="flex justify-center gap-3 sm:gap-4">
              <button
                id="startAgentBtn"
                class="arcade-btn border border-slate-200/60 bg-slate-100/20 text-xs text-slate-100"
              >
                START
              </button>
              <button
                id="stopAgentBtn"
                class="arcade-btn border border-rose-400/50 bg-rose-500/25 text-xs text-rose-100"
              >
                STOP
              </button>
            </div>
            <div class="flex justify-center gap-3 sm:gap-4">
              <button
                id="sendBtn"
                class="arcade-btn border border-amber-300/50 bg-amber-400/25 text-xs text-amber-100"
              >
                SEND
              </button>
              <button
                id="voiceBtn"
                aria-label="Start voice input"
                class="arcade-btn border border-cyan-300/40 bg-cyan-500/25 text-xs text-cyan-100"
                title="Voice Input"
              >
                Mic
              </button>
            </div>
          </div>
          <p id="voiceHint" class="mt-2 min-h-5 text-xs text-slate-400"></p>
        </section>

        <details id="discussionToggle" class="mt-4 rounded-2xl border border-slate-700/70 bg-slate-950/45 p-3 sm:p-4">
          <summary class="cursor-pointer select-none text-sm font-semibold text-slate-200">Discussion</summary>
          <div class="mt-3 space-y-3">
            <p class="text-xs text-slate-400">Ask strategy questions. The server-side LLM will answer using latest agent context.</p>
            <p id="discussionStatus" class="text-xs text-slate-500">Ready.</p>
            <div
              id="discussionChat"
              class="max-h-56 overflow-y-auto rounded-lg border border-slate-700 bg-slate-900/60 p-2 text-xs leading-relaxed"
            ></div>
            <textarea
              id="discussionInput"
              rows="2"
              placeholder="Ask for a tactical plan..."
              class="w-full resize-none rounded-lg border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
            ></textarea>
            <div class="grid grid-cols-2 gap-2">
              <button
                id="discussionSendBtn"
                class="rounded-lg border border-emerald-400/40 bg-emerald-500/15 px-3 py-2 text-sm font-semibold text-emerald-300 active:scale-[0.98]"
              >
                Discuss
              </button>
              <button
                id="discussionUseBtn"
                class="rounded-lg border border-cyan-300/40 bg-cyan-500/20 px-3 py-2 text-sm font-semibold text-cyan-100 active:scale-[0.98]"
              >
                Use Suggestion
              </button>
            </div>
          </div>
        </details>

        <details class="mt-4 rounded-2xl border border-slate-700/70 bg-panel/80 p-3 sm:p-4">
          <summary class="cursor-pointer select-none text-sm font-semibold text-slate-200">Settings</summary>
          <div class="mt-3 space-y-4">
            <section>
              <p class="mb-2 text-[11px] uppercase tracking-widest text-slate-400">Discussion Language</p>
              <select
                id="discussionLanguage"
                class="w-full rounded-lg border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
              >
                <option value="ko">Korean (ko)</option>
                <option value="en">English (en)</option>
                <option value="ja">Japanese (ja)</option>
                <option value="zh">Chinese (zh)</option>
              </select>
            </section>

            <section>
              <p class="mb-2 text-[11px] uppercase tracking-widest text-slate-400">Connection</p>
              <input
                id="wsUrl"
                type="text"
                inputmode="url"
                autocomplete="off"
                class="w-full rounded-lg border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
                placeholder="wss://your-relay-domain/ws"
              />
              <div class="mt-2 grid grid-cols-2 gap-2">
                <button
                  id="connectBtn"
                  class="rounded-lg border border-emerald-400/40 bg-emerald-500/15 px-3 py-2.5 text-sm font-semibold text-emerald-300 active:scale-[0.98]"
                >
                  Connect
                </button>
                <button
                  id="forgetBtn"
                  class="rounded-lg border border-slate-500/40 bg-slate-700/30 px-3 py-2.5 text-sm font-semibold text-slate-200 active:scale-[0.98]"
                >
                  Forget Login
                </button>
              </div>
            </section>

            <section>
              <p class="text-[11px] uppercase tracking-widest text-slate-400">Agent State Snapshot</p>
              <pre
                id="agentStateView"
                class="mt-2 max-h-40 overflow-auto whitespace-pre-wrap rounded-lg border border-slate-700 bg-slate-950/70 p-2 font-mono text-[11px] leading-relaxed text-slate-300"
              >{}</pre>
            </section>

            <section>
              <div class="mb-2 flex items-center justify-between">
                <p class="text-[11px] uppercase tracking-widest text-slate-400">Action Logs</p>
                <button id="clearLogsBtn" class="text-xs text-slate-400 underline underline-offset-2">Clear</button>
              </div>
              <div
                id="logs"
                class="max-h-52 overflow-y-auto rounded-lg border border-slate-700 bg-slate-900/60 p-2 font-mono text-xs leading-relaxed"
              ></div>
            </section>
          </div>
        </details>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
